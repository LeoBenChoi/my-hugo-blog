name: Deploy-Blog
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build Blog
        run: hugo --minify

      - name: Deploy to Aliyun via rsync (Password Auth)
        env:
          RSYNC_PASSWORD: ${{ secrets.REMOTE_PASSWORD }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          TARGET_PATH: ${{ secrets.TARGET }}
        run: |
          # 1. 安装 sshpass 以支持非交互式密码输入
          sudo apt-get update && sudo apt-get install -y sshpass

          # 2. 执行 rsync 同步
          # -a: 归档模式 (保留权限、时间戳等)
          # -v: 显示详细过程
          # -z: 传输时压缩数据
          # --delete: 删除远程服务器上存在但本地已删除的文件 (保持完全一致)
          # -e: 指定 ssh 命令，关闭严格的主机密钥检查 (防止因首次连接弹出确认而失败)
          sshpass -e rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -p 22" \
            public/ \
            $REMOTE_USER@$REMOTE_HOST:$TARGET_PATH
