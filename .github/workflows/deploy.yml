name: Deploy-Blog

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build Blog
        run: hugo --minify

      - name: Deploy to Aliyun via rsync (Password Auth)
        # 使用 env 定义 sshpass 必须的变量名 SSHPASS
        env:
          SSHPASS: ${{ secrets.REMOTE_PASSWORD }}
        run: |
          # 检查并确保 sshpass 可用（通常已预装）
          if ! command -v sshpass &> /dev/null; then
              sudo apt-get update && sudo apt-get install -y sshpass
          fi

          # 执行 rsync 增量同步
          # 逻辑图示: [Local: public/] --(rsync)--> [Remote: TARGET]
          # -a: 归档模式 (保留所有权和时间)
          # -v: 详细输出同步过程
          # -z: 传输时压缩提高速度
          # --delete: 确保远程服务器上没有多余的旧文件
          # -e: 注入 ssh 选项跳过首次连接的确认提示
          sshpass -e rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -p 22" \
            public/ \
            ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}:${{ secrets.TARGET }}
